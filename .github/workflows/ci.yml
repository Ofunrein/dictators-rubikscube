name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend API
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rubiks_app?schema=public
    defaults:
      run:
        working-directory: backend/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Type-check
        run: npm run build

      - name: Run TypeScript tests without compiled solver artifact
        run: npm run test:ts -- tests/app.test.ts tests/authAndPersistence.test.ts tests/security.test.ts tests/aiCoach.test.ts tests/moveCoach.test.ts

      - name: Run Vercel handler tests
        if: ${{ hashFiles('api/solver.js') != '' }}
        run: npm run test:ts -- tests/vercelHandler.test.ts

      - name: Run solver integration tests
        if: ${{ hashFiles('api/solver.js') != '' }}
        run: npm test
