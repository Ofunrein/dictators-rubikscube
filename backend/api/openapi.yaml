{
  "openapi": "3.1.0",
  "info": {
    "title": "Rubik's Cube API",
    "version": "0.2.0",
    "description": "API contract for auth, cube sessions, solve history, stats, and cube operations."
  },
  "servers": [
    {
      "url": "http://localhost:4011",
      "description": "Validation skeleton server"
    },
    {
      "url": "http://localhost:4010",
      "description": "Spec-driven mock server"
    }
  ],
  "tags": [
    {
      "name": "System"
    },
    {
      "name": "Cube"
    },
    {
      "name": "Auth"
    },
    {
      "name": "Sessions"
    },
    {
      "name": "Stats"
    },
    {
      "name": "AI"
    }
  ],
  "paths": {
    "/v1/health": {
      "get": {
        "tags": [
          "System"
        ],
        "summary": "Health check",
        "operationId": "getHealth",
        "responses": {
          "200": {
            "description": "Service heartbeat",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HealthResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/health_ok"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/v1/cube/state/solved": {
      "get": {
        "tags": [
          "Cube"
        ],
        "summary": "Get solved cube state",
        "operationId": "getSolvedState",
        "responses": {
          "200": {
            "description": "Solved 3x3 state",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SolvedStateResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/solved_state"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/v1/cube/moves/apply": {
      "post": {
        "tags": [
          "Cube"
        ],
        "summary": "Apply a single move to a cube state",
        "operationId": "applyMove",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/MoveApplyRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/move_apply_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Move applied",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/MoveApplyResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/move_apply_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          }
        }
      }
    },
    "/v1/cube/scramble": {
      "post": {
        "tags": [
          "Cube"
        ],
        "summary": "Generate a scramble and resulting state",
        "operationId": "generateScramble",
        "requestBody": {
          "required": false,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ScrambleRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/scramble_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Scramble generated",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ScrambleResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/scramble_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          }
        }
      }
    },
    "/v1/cube/solve": {
      "post": {
        "tags": [
          "Cube"
        ],
        "summary": "Request a solution sequence for a cube state",
        "operationId": "solveCube",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/SolveRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/solve_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Mock solution payload",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SolveResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/solve_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          }
        }
      }
    },
    "/v1/auth/register": {
      "post": {
        "tags": [
          "Auth"
        ],
        "summary": "Register a new account",
        "operationId": "registerAccount",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AuthRegisterRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/auth_register_request"
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Account created and authenticated",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthTokensResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/auth_tokens_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "409": {
            "$ref": "#/components/responses/Conflict"
          }
        }
      }
    },
    "/v1/auth/login": {
      "post": {
        "tags": [
          "Auth"
        ],
        "summary": "Login with email or username",
        "operationId": "loginAccount",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AuthLoginRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/auth_login_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Authenticated session",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthTokensResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/auth_tokens_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      }
    },
    "/v1/auth/refresh": {
      "post": {
        "tags": [
          "Auth"
        ],
        "summary": "Rotate refresh session and issue new access token",
        "operationId": "refreshAuth",
        "security": [
          {
            "RefreshCookieAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Session refreshed",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthTokensResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/auth_tokens_response"
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      }
    },
    "/v1/auth/logout": {
      "post": {
        "tags": [
          "Auth"
        ],
        "summary": "Revoke current refresh session",
        "operationId": "logoutAuth",
        "security": [
          {
            "RefreshCookieAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Logout successful",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/LogoutResponse"
                }
              }
            }
          }
        }
      }
    },
    "/v1/auth/me": {
      "get": {
        "tags": [
          "Auth"
        ],
        "summary": "Return current authenticated user",
        "operationId": "getMe",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Current user profile",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthMeResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/auth_me_response"
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      }
    },
    "/v1/cube-sessions": {
      "get": {
        "tags": [
          "Sessions"
        ],
        "summary": "List the current user's cube sessions",
        "operationId": "listCubeSessions",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "status",
            "in": "query",
            "required": false,
            "schema": {
              "$ref": "#/components/schemas/CubeSessionStatus"
            }
          },
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 100,
              "default": 25
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Session list",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CubeSessionsListResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/cube_sessions_list_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      },
      "post": {
        "tags": [
          "Sessions"
        ],
        "summary": "Create a cube session for the current user",
        "operationId": "createCubeSession",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CubeSessionCreateRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/cube_session_create_request"
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Session created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CubeSessionResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/cube_session_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      }
    },
    "/v1/cube-sessions/{id}": {
      "get": {
        "tags": [
          "Sessions"
        ],
        "summary": "Get one cube session",
        "operationId": "getCubeSession",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Session payload",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CubeSessionResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/cube_session_response"
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          }
        }
      },
      "patch": {
        "tags": [
          "Sessions"
        ],
        "summary": "Patch an existing cube session",
        "operationId": "updateCubeSession",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CubeSessionUpdateRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Session updated",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CubeSessionResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          }
        }
      }
    },
    "/v1/cube-sessions/{id}/complete": {
      "post": {
        "tags": [
          "Sessions"
        ],
        "summary": "Complete a cube session and upsert a solve record",
        "operationId": "completeCubeSession",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": false,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CubeSessionCompleteRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/cube_session_complete_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Session completed",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CubeSessionCompleteResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/cube_session_complete_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          }
        }
      }
    },
    "/v1/solve-records": {
      "get": {
        "tags": [
          "Stats"
        ],
        "summary": "List solve records for the current user",
        "operationId": "listSolveRecords",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 100,
              "default": 50
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Solve history",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SolveRecordListResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/solve_records_list_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      }
    },
    "/v1/stats/summary": {
      "get": {
        "tags": [
          "Stats"
        ],
        "summary": "Get solve statistics summary for current user",
        "operationId": "getStatsSummary",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Stats summary",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/StatsSummaryResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/stats_summary_response"
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          }
        }
      }
    },
    "/v1/ai/help": {
      "post": {
        "tags": [
          "AI"
        ],
        "summary": "Request context-aware cube coaching guidance",
        "operationId": "requestAiHelp",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AiHelpRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/ai_help_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Mock AI coaching response payload",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AiHelpResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/ai_help_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          }
        }
      }
    },
    "/v1/ai/move/validate": {
      "post": {
        "tags": [
          "AI"
        ],
        "summary": "Validate a candidate cube move and return coaching feedback",
        "operationId": "validateAiMove",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AiMoveValidationRequest"
              },
              "examples": {
                "default": {
                  "$ref": "#/components/examples/ai_move_validation_request"
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Move validation and coaching guidance",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AiMoveValidationResponse"
                },
                "examples": {
                  "default": {
                    "$ref": "#/components/examples/ai_move_validation_response"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "StickerToken": {
        "type": "string",
        "enum": [
          "W",
          "R",
          "G",
          "Y",
          "O",
          "B"
        ]
      },
      "MoveToken": {
        "type": "string",
        "enum": [
          "U",
          "D",
          "L",
          "R",
          "F",
          "B",
          "U'",
          "D'",
          "L'",
          "R'",
          "F'",
          "B'"
        ]
      },
      "CubeFace": {
        "type": "array",
        "minItems": 9,
        "maxItems": 9,
        "items": {
          "$ref": "#/components/schemas/StickerToken"
        }
      },
      "CubeState": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "U",
          "R",
          "F",
          "D",
          "L",
          "B"
        ],
        "properties": {
          "U": {
            "$ref": "#/components/schemas/CubeFace"
          },
          "R": {
            "$ref": "#/components/schemas/CubeFace"
          },
          "F": {
            "$ref": "#/components/schemas/CubeFace"
          },
          "D": {
            "$ref": "#/components/schemas/CubeFace"
          },
          "L": {
            "$ref": "#/components/schemas/CubeFace"
          },
          "B": {
            "$ref": "#/components/schemas/CubeFace"
          }
        }
      },
      "HealthResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "ok",
          "service",
          "version",
          "timestamp"
        ],
        "properties": {
          "ok": {
            "type": "boolean"
          },
          "service": {
            "type": "string"
          },
          "version": {
            "type": "string"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "SolvedStateResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "state"
        ],
        "properties": {
          "state": {
            "$ref": "#/components/schemas/CubeState"
          }
        }
      },
      "MoveApplyRequest": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "state",
          "move"
        ],
        "properties": {
          "state": {
            "$ref": "#/components/schemas/CubeState"
          },
          "move": {
            "$ref": "#/components/schemas/MoveToken"
          }
        }
      },
      "MoveApplyResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "state",
          "appliedMove"
        ],
        "properties": {
          "state": {
            "$ref": "#/components/schemas/CubeState"
          },
          "appliedMove": {
            "$ref": "#/components/schemas/MoveToken"
          }
        }
      },
      "ScrambleRequest": {
        "type": "object",
        "additionalProperties": false,
        "properties": {
          "length": {
            "type": "integer",
            "minimum": 1,
            "maximum": 100,
            "default": 25
          },
          "seed": {
            "type": "integer",
            "minimum": 0,
            "maximum": 2147483647
          }
        }
      },
      "ScrambleResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "scramble",
          "state"
        ],
        "properties": {
          "scramble": {
            "type": "array",
            "minItems": 1,
            "items": {
              "$ref": "#/components/schemas/MoveToken"
            }
          },
          "state": {
            "$ref": "#/components/schemas/CubeState"
          }
        }
      },
      "SolveRequest": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "state"
        ],
        "properties": {
          "state": {
            "$ref": "#/components/schemas/CubeState"
          },
          "strategy": {
            "type": "string",
            "enum": [
              "beginner",
              "cfop"
            ],
            "default": "beginner"
          }
        }
      },
      "SolveResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "moves",
          "estimatedMoveCount",
          "isMock",
          "note"
        ],
        "properties": {
          "moves": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/MoveToken"
            }
          },
          "estimatedMoveCount": {
            "type": "integer",
            "minimum": 0
          },
          "isMock": {
            "type": "boolean"
          },
          "note": {
            "type": "string"
          }
        }
      },
      "ValidationErrorDetail": {
