<!doctype html>
<!--
  This is the single HTML page our entire React app lives inside.
  The browser loads this file first, which then loads main.jsx via the
  script tag at the bottom. React takes over and renders the whole app
  into the div with id="root".

  This file also:
    - Loads Google Fonts (Space Grotesk, Anton, Inter, IBM Plex Mono)
      so our custom typography is available everywhere
    - Includes an SVG noise filter that creates the subtle grain texture
      overlay on the landing page
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <title>The Dictators | We lead code.</title>
  </head>
  <body class="bg-dictator-smoke font-body text-dictator-charcoal antialiased overflow-x-hidden selection:bg-dictator-red selection:text-white">
    <div id="root"></div>
    
    <!-- Global SVG Filter for Noise Overlay -->
    <svg class="hidden" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      </filter>
    </svg>
    <div class="noise-overlay"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
