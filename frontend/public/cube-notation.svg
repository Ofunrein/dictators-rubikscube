<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#0D0D0D"/>
  <!-- Cube body -->
  <g transform="translate(300,180)">
    <!-- Top face (U) - Yellow -->
    <polygon points="0,-80 -100,-40 0,0 100,-40" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
    <!-- Left face (L) - Orange -->
    <polygon points="-100,-40 -100,60 0,100 0,0" fill="#FF6B00" stroke="#333" stroke-width="1.5"/>
    <!-- Right face (R) - Red -->
    <polygon points="100,-40 100,60 0,100 0,0" fill="#CC1A1A" stroke="#333" stroke-width="1.5"/>
    <!-- Grid lines - top -->
    <line x1="-66,-53" x2="34,-13" y1="0" y2="0" stroke="#333" stroke-width="0.8" transform="translate(-66,-53) rotate(0)"/>
    <line x1="-33" y1="-67" x2="-33" y2="13" stroke="#555" stroke-width="0.5" transform="rotate(-27 0 -40)"/>
    <line x1="33" y1="-67" x2="33" y2="13" stroke="#555" stroke-width="0.5" transform="rotate(27 0 -40)"/>
  </g>
  <!-- Labels -->
  <text x="300" y="62" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold">U (Up)</text>
  <text x="152" y="250" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="14" font-weight="bold">L</text>
  <text x="448" y="250" text-anchor="middle" fill="#CC1A1A" font-family="monospace" font-size="14" font-weight="bold">R</text>
  <text x="300" y="320" text-anchor="middle" fill="#00AA00" font-family="monospace" font-size="14" font-weight="bold">F (Front)</text>
  <!-- Notation key -->
  <text x="300" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="12">U · D · L · R · F · B &nbsp;|&nbsp; ' = counter-clockwise &nbsp;|&nbsp; 2 = double turn</text>
  <!-- Move arrows -->
  <g transform="translate(300,100)">
    <path d="M 0,-10 A 25,25 0 1,1 -18,18" stroke="#FFD700" stroke-width="2" fill="none" marker-end="url(#arrow-y)"/>
  </g>
  <defs>
    <marker id="arrow-y" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFD700"/>
    </marker>
  </defs>
</svg>
